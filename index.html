<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ghost Touch: Haptic Profile Evaluation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="lang-switcher">
  <button id="lang-toggle" class="lang-btn">中文</button>
</div>

<div class="container">
  <div class="header">
    <h1 id="h-title"></h1>
    <p id="h-subtitle"></p>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progress-text">0%</div>

  <!-- Loading -->
  <div class="page active" id="loading">
    <div class="loading"><div class="spinner"></div><p>Loading / 加载中...</p></div>
  </div>

  <!-- Consent -->
  <div class="page" id="consent">
    <div class="card">
      <h2 id="c-title"></h2>
      <h3 id="c-purpose-title"></h3><p id="c-purpose"></p>
      <h3 id="c-whatyoudo-title"></h3>
      <ul><li id="c-part1"></li><li id="c-part2"></li><li id="c-part3"></li></ul>
      <h3 id="c-haptic-title"></h3><p id="c-haptic"></p>
      <h3 id="c-risks-title"></h3><p id="c-risks"></p>
      <h3 id="c-data-title"></h3><p id="c-data"></p>
      <h3 id="c-rights-title"></h3><p id="c-rights"></p>
      <div class="consent-box">
        <label class="consent-label">
          <input type="checkbox" id="consent-checkbox">
          <span id="c-agree"></span>
        </label>
      </div>
      <div class="btn-group"><button class="btn btn-primary" id="consent-agree"></button></div>
    </div>
  </div>

  <!-- Demographics -->
  <div class="page" id="demographics">
    <div class="card">
      <h2 id="d-title"></h2>
      <div class="form-group">
        <label id="d-age-label" for="demo-age"></label>
        <select id="demo-age">
          <option value="" id="d-age-select"></option>
          <option value="18-24">18-24</option><option value="25-34">25-34</option>
          <option value="35-44">35-44</option><option value="45-54">45-54</option>
          <option value="55-64">55-64</option><option value="65+">65+</option>
        </select>
      </div>
      <div class="form-group">
        <label id="d-gender-label" for="demo-gender"></label>
        <select id="demo-gender">
          <option value="" id="d-gender-select"></option>
          <option value="female" id="d-gender-f"></option><option value="male" id="d-gender-m"></option>
          <option value="non-binary" id="d-gender-nb"></option><option value="prefer-not" id="d-gender-pnts"></option>
        </select>
      </div>
      <div class="form-group">
        <label id="d-vr-label"></label>
        <div class="radio-group">
          <label><input type="radio" name="vr-experience" value="never"><span id="d-vr-never"></span></label>
          <label><input type="radio" name="vr-experience" value="occasionally"><span id="d-vr-occ"></span></label>
          <label><input type="radio" name="vr-experience" value="regularly"><span id="d-vr-reg"></span></label>
        </div>
      </div>
      <div class="form-group">
        <label id="d-ghost-label"></label>
        <div class="radio-group">
          <label><input type="radio" name="ghost-familiarity" value="not-familiar"><span id="d-ghost-not"></span></label>
          <label><input type="radio" name="ghost-familiarity" value="somewhat"><span id="d-ghost-some"></span></label>
          <label><input type="radio" name="ghost-familiarity" value="very"><span id="d-ghost-very"></span></label>
        </div>
      </div>
      <div class="btn-group"><button class="btn btn-primary" id="demo-next"></button></div>
    </div>
  </div>

  <!-- Part 1 Intro -->
  <div class="page" id="part1-intro">
    <div class="card">
      <h2 id="p1-title"></h2>
      <p id="p1-desc"></p>
      <p id="p1-param-intro" style="font-weight:600;margin-top:12px"></p>
      <ul>
        <li id="p1-amp"></li><li id="p1-freq"></li><li id="p1-thermal"></li>
        <li id="p1-rough"></li>
      </ul>
      <p id="p1-task"></p>
      <div class="btn-group"><button class="btn btn-primary" id="part1-start"></button></div>
    </div>
  </div>

  <!-- Trial Page (dynamic) -->
  <div class="page" id="trial"></div>

  <!-- Part 2 Intro -->
  <div class="page" id="part2-intro">
    <div class="card">
      <h2 id="p2-title"></h2>
      <p id="p2-desc"></p>
      <p id="p2-task"></p>
      <p id="p2-how"></p>
      <div class="btn-group"><button class="btn btn-primary" id="part2-start"></button></div>
    </div>
  </div>

  <!-- Debrief -->
  <div class="page" id="debrief">
    <div class="card">
      <h2 id="db-title"></h2>
      <div class="form-group">
        <label id="db-strategy-label" for="debrief-strategy"></label>
        <textarea id="debrief-strategy"></textarea>
      </div>
      <div class="form-group">
        <label id="db-difficulty-label" for="debrief-difficulty"></label>
        <textarea id="debrief-difficulty"></textarea>
      </div>
      <div class="form-group">
        <label id="db-comments-label" for="debrief-comments"></label>
        <textarea id="debrief-comments"></textarea>
      </div>
      <div class="btn-group"><button class="btn btn-primary" id="debrief-submit"></button></div>
    </div>
  </div>

  <!-- Completion -->
  <div class="page" id="complete">
    <div class="completion"><h2></h2><p>Processing...</p></div>
  </div>

</div>

<script src="i18n.js"></script>
<script src="visualizer.js"></script>
<script src="app.js"></script>
</body>
</html>
